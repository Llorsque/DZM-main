<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Zilveren Bal 2026 — Hoofdtoernooi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:          #0a1628;
    --navy-mid:      #0d1b33;
    --navy-card:     #111e38;
    --silver:        #b8cce0;
    --silver-dim:    #6a8aaa;
    --silver-bright: #dde8f4;
    --gold:          #f0c040;
    --ice:           #cce4f8;
    --ice-dim:       #6898b8;
    --accent:        #4a8eca;
    --red-baan:      #e84040;
    --geel-baan:     #f0c040;
    --green:         #38c060;
    --dames-color:   #d060a0;
    --heren-color:   #4a8eca;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--navy);
    color: var(--silver-bright);
    font-family: 'DM Sans', sans-serif;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
    background-image:
      radial-gradient(ellipse at 15% 60%, rgba(74,142,202,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(200,212,232,0.04) 0%, transparent 45%);
  }

  /* ══ HEADER ══ */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 7px 18px;
    background: var(--navy-mid);
    border-bottom: 1px solid rgba(200,220,240,0.10);
    flex-shrink: 0;
  }
  .logo-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #dce8f8, #8aaccc, #dce8f8);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', cursive; font-size: 8px;
    color: var(--navy); text-align: center; line-height: 1.3;
    box-shadow: 0 0 12px rgba(200,212,232,0.2); flex-shrink: 0;
  }
  .header-title { font-family:'Bebas Neue',cursive; font-size:20px; letter-spacing:3px; line-height:1; }
  .header-title span { color: var(--gold); }
  .header-sub { font-size:9px; color:var(--ice-dim); letter-spacing:2px; text-transform:uppercase; }

  /* Gender toggle */
  .gender-toggle {
    display: flex; align-items: center;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(200,220,240,0.12);
    border-radius: 8px; overflow: hidden;
    margin-left: 16px;
  }
  .gender-btn {
    padding: 5px 16px; cursor: pointer;
    font-family: 'Bebas Neue', cursive; font-size: 13px; letter-spacing: 2px;
    border: none; background: transparent; transition: all 0.18s;
    color: var(--silver-dim);
  }
  .gender-btn.dames.active { background: rgba(208,96,160,0.22); color: var(--dames-color); }
  .gender-btn.heren.active { background: rgba(74,142,202,0.22); color: var(--heren-color); }
  .gender-btn:not(.active):hover { background: rgba(200,220,240,0.06); color: var(--silver); }

  /* Mode toggle */
  .mode-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px; border-left: 1px solid rgba(200,220,240,0.10);
    margin-left: 6px;
  }
  .mode-label { font-size: 9px; color: var(--ice-dim); letter-spacing: 1px; }
  .mode-btn {
    padding: 4px 12px; border-radius: 5px; cursor: pointer;
    font-family: 'Bebas Neue', cursive; font-size: 12px; letter-spacing: 1.5px;
    border: 1px solid rgba(200,220,240,0.15); background: rgba(200,220,240,0.05);
    color: var(--silver-dim); transition: all 0.15s;
  }
  .mode-btn.active { background: rgba(240,192,64,0.15); border-color: var(--gold); color: var(--gold); }
  .mode-btn:not(.active):hover { background: rgba(200,220,240,0.08); color: var(--silver); }

  .header-nav { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .nav-hint { font-size:9px; color:var(--ice-dim); letter-spacing:1px; }
  .nav-btn {
    width:30px; height:30px;
    border:1px solid rgba(200,212,232,0.18); background:rgba(200,212,232,0.05);
    color:var(--silver); border-radius:6px; cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .nav-btn:hover { background:rgba(200,212,232,0.12); border-color:var(--accent); color:#fff; }
  .nav-btn:disabled { opacity:0.28; cursor:default; }
  .rit-counter { font-family:'Bebas Neue',cursive; font-size:18px; letter-spacing:2px; color:var(--gold); min-width:52px; text-align:center; }

  /* Zoom */
  .zoom-group {
    display:flex; align-items:center; gap:5px;
    padding-left:10px; border-left:1px solid rgba(200,220,240,0.10); margin-left:4px;
  }
  .zoom-label { font-size:9px; color:var(--ice-dim); letter-spacing:1px; white-space:nowrap; }
  .zoom-btn {
    width:26px; height:26px;
    border:1px solid rgba(200,212,232,0.16); background:rgba(200,212,232,0.05);
    color:var(--silver); border-radius:5px; cursor:pointer; font-size:13px; font-weight:600;
    display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .zoom-btn:hover { background:rgba(200,212,232,0.12); border-color:var(--accent); color:#fff; }
  .zoom-pct { font-family:'Bebas Neue',cursive; font-size:14px; color:var(--silver); min-width:36px; text-align:center; letter-spacing:1px; }
  .zoom-divider { width:1px; height:20px; background:rgba(200,220,240,0.10); margin:0 3px; }
  .zoom-presets { display:flex; gap:3px; }
  .zoom-preset {
    font-size:8px; padding:2px 5px; border-radius:4px; cursor:pointer;
    border:1px solid rgba(200,212,232,0.13); background:rgba(200,212,232,0.04);
    color:var(--silver-dim); transition:all 0.15s; white-space:nowrap;
  }
  .zoom-preset:hover { background:rgba(200,212,232,0.10); color:var(--silver); }
  .zoom-preset.active { background:rgba(74,142,202,0.20); border-color:var(--accent); color:var(--ice); }

  /* ══ LAYOUT ══ */
  .main { display:flex; flex:1; overflow:hidden; }

  /* ══ LEFT PANEL ══ */
  .panel-left {
    width: 200px; flex-shrink:0;
    border-right:1px solid rgba(200,220,240,0.07);
    display:flex; flex-direction:column;
    background:rgba(7,15,28,0.6);
  }
  .panel-left-header {
    padding:7px 11px 6px;
    border-bottom:1px solid rgba(200,220,240,0.07);
    font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:3px; color:var(--ice-dim);
    flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  }
  .startlist-scroll { flex:1; overflow-y:auto; padding:3px 0; }
  .startlist-scroll::-webkit-scrollbar { width:3px; }
  .startlist-scroll::-webkit-scrollbar-thumb { background:rgba(200,212,232,0.12); border-radius:2px; }

  .rit-group {
    padding:4px 9px; cursor:pointer;
    border-left:3px solid transparent; transition:background 0.12s;
  }
  .rit-group:hover { background:rgba(200,212,232,0.05); }
  .rit-group.active { background:rgba(74,142,202,0.16); border-left-color:var(--accent); }
  .rit-group.upcoming { background:rgba(74,142,202,0.06); border-left-color:rgba(74,142,202,0.3); }
  .rit-label { display:flex; align-items:center; gap:4px; margin-bottom:2px; }
  .rit-num-badge { font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:1px; color:var(--gold); }

  .rit-riders-compact { display:flex; flex-direction:column; gap:1px; }
  .rider-tiny { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--silver); line-height:1.45; }
  .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .dot.wit  { background:#fff; }
  .dot.rood { background:var(--red-baan); }
  .dot.geel { background:var(--geel-baan); }
  .dot.empty { background:rgba(200,220,240,0.2); border:1px dashed rgba(200,220,240,0.3); }

  .omloop-header {
    padding:5px 11px 3px;
    font-family:'Bebas Neue',cursive; font-size:10px; letter-spacing:2px;
    color:rgba(200,220,240,0.35); border-top:1px solid rgba(200,220,240,0.07); margin-top:2px;
  }
  .omloop-header:first-child { border-top:none; margin-top:0; }

  /* ══ RIGHT PANEL ══ */
  .panel-right {
    flex:1; display:flex; flex-direction:column;
    overflow:hidden; min-width:0; position:relative;
  }
  #tileZoomWrap { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
  #tileZoomInner {
    position:absolute; inset:0; display:flex; flex-direction:column;
    padding:10px 14px 6px; gap:8px;
    transform-origin: top left; transition:transform 0.15s ease;
    width:100%; height:100%;
  }
  .rit-cards { display:flex; flex-direction:column; gap:8px; flex:1; overflow:hidden; }

  /* ══ RIT CARD ══ */
  .rit-card {
    flex:1; background:var(--navy-card);
    border:1px solid rgba(200,220,240,0.08); border-radius:11px;
    display:flex; flex-direction:column; overflow:hidden; min-height:0;
  }
  .rit-card.current { border-color:rgba(74,142,202,0.38); box-shadow:0 0 24px rgba(74,142,202,0.09); }

  .card-header {
    display:flex; align-items:center; gap:10px;
    padding:7px 14px; border-bottom:1px solid rgba(200,220,240,0.07);
    flex-shrink:0; background:rgba(0,0,0,0.18);
  }
  .card-rit-num { font-family:'Bebas Neue',cursive; font-size:32px; color:var(--gold); line-height:1; min-width:40px; }
  .card-meta { flex:1; }
  .card-tag { font-family:'Bebas Neue',cursive; font-size:10px; letter-spacing:3px; color:var(--accent); }
  .card-sub { font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:2px; color:var(--silver-dim); }
  .omloop-pill {
    font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:2px;
    padding:3px 10px; border-radius:20px;
    background:rgba(74,142,202,0.14); color:var(--accent);
    border:1px solid rgba(74,142,202,0.25);
  }
  .rit-card.current .omloop-pill { background:rgba(74,142,202,0.22); color:var(--ice); }

  /* ══ RIDER COLUMNS ══ */
  .card-body { display:flex; flex:1; overflow:hidden; min-height:0; }
  .rider-col {
    flex:1; display:flex; flex-direction:column;
    padding:9px 12px 8px;
    border-right:1px solid rgba(200,220,240,0.06);
    overflow-y:auto; min-width:0;
  }
  .rider-col:last-child { border-right:none; }
  .rider-col::-webkit-scrollbar { width:3px; }
  .rider-col::-webkit-scrollbar-thumb { background:rgba(200,212,232,0.10); border-radius:2px; }

  .baan-tag { display:flex; align-items:center; gap:6px; margin-bottom:3px; flex-shrink:0; }
  .baan-bar { width:22px; height:3px; border-radius:2px; flex-shrink:0; }
  .baan-bar.wit  { background:#fff; }
  .baan-bar.rood { background:var(--red-baan); }
  .baan-bar.geel { background:var(--geel-baan); }
  .baan-lbl { font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:1.5px; }
  .baan-lbl.wit  { color:rgba(255,255,255,0.65); }
  .baan-lbl.rood { color:var(--red-baan); }
  .baan-lbl.geel { color:var(--geel-baan); }

  .rider-name-full {
    font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:0.5px;
    color:var(--silver-bright); line-height:1; margin-bottom:8px; flex-shrink:0;
  }
  .rider-name-full.empty-slot {
    color:rgba(200,220,240,0.2); font-size:14px; margin-top:4px;
    font-style:italic; font-family:'DM Sans',sans-serif; font-weight:300; letter-spacing:0;
  }

  .info-list { display:flex; flex-direction:column; gap:0; flex:1; min-height:0; }
  .info-item {
    display:flex; flex-direction:column;
    padding:4px 0; border-bottom:1px solid rgba(200,220,240,0.06); flex-shrink:0;
  }
  .info-item:last-child { border-bottom:none; }
  .info-lbl { font-size:8.5px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ice-dim); margin-bottom:2px; }
  .info-val { font-size:12.5px; color:var(--silver); line-height:1.35; word-break:break-word; }
  .info-val.hi { color:var(--ice); font-weight:500; }

  .no-info { font-size:11px; color:rgba(200,212,232,0.22); font-style:italic; margin-top:6px; }

  /* KB HINT */
  .kb-hint {
    display:flex; justify-content:center; align-items:center; gap:6px;
    font-size:9px; color:rgba(200,212,232,0.2); letter-spacing:1px;
    flex-shrink:0; padding-bottom:2px;
  }
  .kkey {
    background:rgba(200,212,232,0.06); border:1px solid rgba(200,212,232,0.11);
    border-radius:4px; padding:1px 6px; font-size:10px; color:rgba(200,212,232,0.32);
  }

  /* ══ EDITOR MODE ══ */
  .editor-overlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(5,12,24,0.92); backdrop-filter:blur(4px);
    flex-direction:column; overflow:hidden;
  }
  .editor-overlay.open { display:flex; }

  .editor-header {
    display:flex; align-items:center; gap:16px;
    padding:12px 24px; background:var(--navy-mid);
    border-bottom:1px solid rgba(200,220,240,0.10);
    flex-shrink:0;
  }
  .editor-title { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:3px; }
  .editor-title span { color:var(--gold); }
  .editor-close {
    margin-left:auto; padding:6px 18px; border-radius:7px; cursor:pointer;
    font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:2px;
    background:rgba(74,142,202,0.15); border:1px solid rgba(74,142,202,0.3);
    color:var(--ice); transition:all 0.15s;
  }
  .editor-close:hover { background:rgba(74,142,202,0.28); }
  .editor-save {
    padding:6px 18px; border-radius:7px; cursor:pointer;
    font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:2px;
    background:rgba(56,192,96,0.18); border:1px solid rgba(56,192,96,0.35);
    color:#6de898; transition:all 0.15s;
  }
  .editor-save:hover { background:rgba(56,192,96,0.3); }

  .editor-body {
    display:flex; flex:1; overflow:hidden; gap:0;
  }

  /* Left: deelnemers pool */
  .editor-pool {
    width:220px; flex-shrink:0;
    border-right:1px solid rgba(200,220,240,0.08);
    display:flex; flex-direction:column;
    background:rgba(7,15,28,0.5);
  }
  .editor-pool-header {
    padding:8px 12px; border-bottom:1px solid rgba(200,220,240,0.08);
    font-family:'Bebas Neue',cursive; font-size:12px; letter-spacing:2px; color:var(--ice-dim);
    flex-shrink:0;
  }
  .editor-pool-scroll { flex:1; overflow-y:auto; padding:4px 0; }
  .editor-pool-scroll::-webkit-scrollbar { width:3px; }
  .editor-pool-scroll::-webkit-scrollbar-thumb { background:rgba(200,212,232,0.12); border-radius:2px; }

  .pool-rider {
    padding:5px 12px; font-size:12px; color:var(--silver);
    cursor:pointer; transition:background 0.12s; display:flex; align-items:center; gap:6px;
  }
  .pool-rider:hover { background:rgba(200,212,232,0.07); }
  .pool-rider.used { color:rgba(200,212,232,0.3); cursor:default; }
  .pool-rider.used:hover { background:transparent; }
  .pool-rider .used-badge {
    font-size:8px; color:rgba(200,212,232,0.3); margin-left:auto; letter-spacing:0.5px;
  }

  /* Right: rit builder */
  .editor-ritten {
    flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px;
  }
  .editor-ritten::-webkit-scrollbar { width:4px; }
  .editor-ritten::-webkit-scrollbar-thumb { background:rgba(200,212,232,0.12); border-radius:2px; }

  .editor-rit-row {
    display:flex; align-items:center; gap:10px;
    background:var(--navy-card); border:1px solid rgba(200,220,240,0.08);
    border-radius:9px; padding:8px 12px;
  }
  .editor-rit-num {
    font-family:'Bebas Neue',cursive; font-size:28px; color:var(--gold);
    min-width:36px; line-height:1;
  }
  .editor-slots { display:flex; gap:8px; flex:1; }
  .editor-slot { flex:1; display:flex; flex-direction:column; gap:3px; }
  .slot-baan-label {
    font-size:8.5px; letter-spacing:1px; font-family:'Bebas Neue',cursive;
    display:flex; align-items:center; gap:4px;
  }
  .slot-dot { width:6px; height:6px; border-radius:50%; }
  .slot-dot.wit  { background:#fff; }
  .slot-dot.rood { background:var(--red-baan); }
  .slot-dot.geel { background:var(--geel-baan); }
  .slot-label-txt.wit  { color:rgba(255,255,255,0.55); }
  .slot-label-txt.rood { color:var(--red-baan); }
  .slot-label-txt.geel { color:var(--geel-baan); }

  .slot-select {
    width:100%; background:rgba(0,0,0,0.3);
    border:1px solid rgba(200,220,240,0.14); border-radius:5px;
    color:var(--silver); font-size:11px; padding:4px 6px;
    font-family:'DM Sans',sans-serif; cursor:pointer; outline:none;
    transition:border-color 0.15s;
  }
  .slot-select:focus { border-color:var(--accent); }
  .slot-select option { background:#111e38; }

  .editor-add-rit {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:8px; border:1px dashed rgba(200,220,240,0.15); border-radius:9px;
    cursor:pointer; color:rgba(200,220,240,0.35); font-size:12px; letter-spacing:1px;
    transition:all 0.15s;
  }
  .editor-add-rit:hover { border-color:rgba(74,142,202,0.4); color:var(--accent); background:rgba(74,142,202,0.05); }

  .editor-rit-del {
    width:24px; height:24px; border-radius:5px; cursor:pointer; font-size:13px;
    border:1px solid rgba(232,64,64,0.2); background:rgba(232,64,64,0.06);
    color:rgba(232,64,64,0.5); display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; flex-shrink:0;
  }
  .editor-rit-del:hover { background:rgba(232,64,64,0.18); color:var(--red-baan); border-color:var(--red-baan); }

  /* omloop section in editor */
  .editor-omloop-title {
    font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:3px;
    color:var(--ice-dim); padding:4px 0 2px; border-bottom:1px solid rgba(200,220,240,0.08);
    margin-bottom:4px;
  }

  /* ══ SPORTS DATA STYLES ══ */
  .afscheid-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.25);
    border-radius: 4px; padding: 2px 8px; margin-bottom: 5px;
    font-family: 'Bebas Neue', cursive; font-size: 10px;
  }
  .time-val {
    font-size: 16px !important; font-weight: 600 !important;
    letter-spacing: 1px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .time-loc {
    font-size: 10px; font-weight: 400; color: var(--ice-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .zb-history {
    display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;
  }
  .zb-cell {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(200,220,240,0.04);
    border: 1px solid rgba(200,220,240,0.08);
    border-radius: 6px; padding: 4px 8px; min-width: 44px;
  }
  .zb-cell.has-result {
    background: rgba(74,142,202,0.12);
    border-color: rgba(74,142,202,0.25);
  }
  .zb-yr { font-size: 8.5px; color: var(--ice-dim); letter-spacing: 1px; margin-bottom: 2px; }
  .zb-val {
    font-family: 'Bebas Neue', cursive; font-size: 16px;
    color: rgba(200,220,240,0.25); letter-spacing: 1px; line-height: 1;
  }
  .zb-cell.has-result .zb-val { color: var(--gold); }

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-circle">DE<br>ZILV<br>BAL</div>
  <div>
    <div class="header-title">De <span>Zilveren</span> Bal</div>
    <div class="header-sub">Hoofdtoernooi 2026</div>
  </div>

  <div class="gender-toggle">
    <button class="gender-btn dames active" id="btnDames" onclick="setGender('dames')">DAMES</button>
    <button class="gender-btn heren" id="btnHeren" onclick="setGender('heren')">HEREN</button>
  </div>

  <div class="mode-toggle">
    <span class="mode-label">MODUS</span>
    <button class="mode-btn active" id="btnView" onclick="setMode('view')">PRESENTATIE</button>
    <button class="mode-btn" id="btnEdit" onclick="setMode('edit')">STARTLIJST INVULLEN</button>
  </div>

  <div class="header-nav">
    <span class="nav-hint">RIT</span>

function getInfo(naam) {
  const n = s => s.trim().toLowerCase().replace(/\s+/g,' ');
  const nm = n(naam);
  for (const k of Object.keys(INFO)) if (n(k)===nm) return INFO[k];
  return null;
}

// ══ STATE ═════════════════════════════════════════════════════════════════════
let gender = 'dames';  // 'dames' | 'heren'
let cur = 0;

// Startlijsten opgeslagen per gender: array van ritten
// Rit = { omloop, banen: [{naam}x3] }
// Loaded from localStorage or empty
function storageKey(g) { return `dzb_main_startlijst_${g}`; }

function loadStartlijst(g) {
  try {
    const raw = localStorage.getItem(storageKey(g));
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}
function saveStartlijst(g, data) {
  localStorage.setItem(storageKey(g), JSON.stringify(data));
}

let startlijsten = {
  dames: loadStartlijst('dames'),
  heren: loadStartlijst('heren')
};

function getSL() { return startlijsten[gender]; }

// ══ VIEW RENDERING ════════════════════════════════════════════════════════════
const bc = b => b ? b.toLowerCase() : 'wit';
const baanMap = { Wit:'BINNEN · WIT', Rood:'MIDDEN · ROOD', Geel:'BUITEN · GEEL' };
const BAANEN = ['Wit','Geel','Rood']; // Display: binnen → buiten → midden (links→rechts)
// Fields not used directly — see riderColHTML for custom layout

function riderColHTML(naam, baanIdx) {
  const baan = BAANEN[baanIdx];
  const cls = bc(baan);
  const info = naam ? getInfo(naam) : null;
  const isAfscheid = naam && AFSCHEID.some(n => naam.toLowerCase().includes(n.toLowerCase()));
  let nameHTML, bodyHTML;

  if (!naam) {
    nameHTML = `<div class="rider-name-full empty-slot">Nog niet ingevuld</div>`;
    bodyHTML = '';
  } else {
    const afscheidBadge = isAfscheid
      ? `<div class="afscheid-badge">⭐ LAATSTE ZILVEREN BAL</div>`
      : '';
    nameHTML = `${afscheidBadge}<div class="rider-name-full">${naam}</div>`;
    if (info) {
      // ZB history — only show years with results
      const zbItems = [
        { yr:'2025', val:info.zb25 },
        { yr:'2024', val:info.zb24 },
        { yr:'2023', val:info.zb23 },
        { yr:'2022', val:info.zb22 },
      ];
      const zbRow = zbItems.map(z =>
        `<div class="zb-cell ${z.val!=='—'?'has-result':''}">
          <div class="zb-yr">${z.yr}</div>
          <div class="zb-val">${z.val}</div>
        </div>`
      ).join('');

      bodyHTML = `<div class="info-list">
        <div class="info-item">
          <div class="info-lbl">100m PR</div>
          <div class="info-val hi time-val">${info.pr100}<span class="time-loc">${info.loc100}</span></div>
        </div>
        <div class="info-item">
          <div class="info-lbl">500m PR</div>
          <div class="info-val hi time-val">${info.pr500}<span class="time-loc">${info.loc500}</span></div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Opening 100m (in 500m)</div>
          <div class="info-val">${info.tus100}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">De Zilveren Bal — historie</div>
          <div class="zb-history">${zbRow}</div>
        </div>
      </div>`;
    } else {
      bodyHTML = `<div class="no-info">Nog geen tijden bekend</div>`;
    }
  }

  return `
    <div class="rider-col">
      <div class="baan-tag">
        <div class="baan-bar ${cls}"></div>
        <span class="baan-lbl ${cls}">${baanMap[baan]}</span>
      </div>
      ${nameHTML}${bodyHTML}
    </div>`;
}

function cardHTML(rit, isCurrent) {
  const gLabel = gender === 'dames' ? 'DAMES' : 'HEREN';
  const cols = rit.banen.map((naam, i) => riderColHTML(naam, i)).join('');
  return `
    <div class="rit-card${isCurrent?' current':''}">
      <div class="card-header">
        <div class="card-rit-num">${rit.rit}</div>
        <div class="card-meta">
          <div class="card-tag">${isCurrent?'HUIDIGE RIT':'VOLGENDE RIT'}</div>
          <div class="card-sub">${gLabel}</div>
        </div>
        <div class="omloop-pill">OMLOOP ${rit.omloop}</div>
      </div>
      <div class="card-body">${cols}</div>
    </div>`;
}

function renderLeft() {
  const sl = getSL();
  if (!sl.length) {
    document.getElementById('startlistScroll').innerHTML =
      `<div style="padding:20px 12px;font-size:11px;color:rgba(200,220,240,0.3);font-style:italic;line-height:1.6;">
        Nog geen startlijst ingevuld.<br><br>
        Klik op <strong style="color:rgba(200,220,240,0.5)">STARTLIJST INVULLEN</strong> om de ritten samen te stellen.
      </div>`;
    return;
  }
  let html='', prevOmloop=null;
  sl.forEach((r,i) => {
    if (r.omloop !== prevOmloop) {
      html += `<div class="omloop-header">OMLOOP ${r.omloop}</div>`;
      prevOmloop = r.omloop;
    }
    const cls = i===cur ? 'rit-group active' : i===cur+1 ? 'rit-group upcoming' : 'rit-group';
    const riders = r.banen.map((n,bi) => {
      const dc = bc(BAANEN[bi]);
      return `<div class="rider-tiny"><div class="dot ${n?dc:'empty'}"></div>${n||'—'}</div>`;
    }).join('');
    html += `<div class="${cls}" id="ri${i}" onclick="jumpTo(${i})">
      <div class="rit-label"><span class="rit-num-badge">RIT ${r.rit}</span></div>
      <div class="rit-riders-compact">${riders}</div>
    </div>`;
  });
  document.getElementById('startlistScroll').innerHTML = html;
}

function renderRight() {
  const sl = getSL();
  if (!sl.length) {
    document.getElementById('ritCards').innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;opacity:0.3;">
        <div style="font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:3px;">GEEN STARTLIJST</div>
        <div style="font-size:13px;">Gebruik "Startlijst invullen" om ritten toe te voegen</div>
      </div>`;
    document.getElementById('ritCounter').textContent = '— / —';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    return;
  }
  const c = sl[cur], n = sl[cur+1];
  document.getElementById('ritCards').innerHTML = cardHTML(c,true) + (n ? cardHTML(n,false) : '');
  document.getElementById('ritCounter').textContent = `${c.rit} / ${sl.length}`;
  document.getElementById('btnPrev').disabled = cur===0;
  document.getElementById('btnNext').disabled = cur===sl.length-1;
}

function render() {
  renderLeft(); renderRight();
  document.getElementById(`ri${cur}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function navigate(dir) {
  const sl = getSL();
  const n = cur+dir;
  if (n>=0 && n<sl.length) { cur=n; render(); }
}
function jumpTo(i) { cur=i; render(); }

function setGender(g) {
  gender = g;
  cur = 0;
  document.getElementById('btnDames').classList.toggle('active', g==='dames');
  document.getElementById('btnHeren').classList.toggle('active', g==='heren');
  render();
}

// ══ EDITOR ════════════════════════════════════════════════════════════════════
let editorRitten = []; // working copy while editing

function setMode(mode) {
  document.getElementById('btnView').classList.toggle('active', mode==='view');
  document.getElementById('btnEdit').classList.toggle('active', mode==='edit');
  if (mode === 'edit') openEditor();
}

function openEditor() {
  // Deep copy current startlijst for editing
  editorRitten = JSON.parse(JSON.stringify(getSL()));
  if (!editorRitten.length) {
    // Start with one empty omloop
    addEditorOmloop(1);
  }
  document.getElementById('editorGenderTitle').textContent = gender === 'dames' ? 'Dames' : 'Heren';
  renderEditor();
  document.getElementById('editorOverlay').classList.add('open');
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('open');
  setMode('view');
  document.getElementById('btnView').classList.add('active');
  document.getElementById('btnEdit').classList.remove('active');
}

function saveAndClose() {
  startlijsten[gender] = JSON.parse(JSON.stringify(editorRitten));
  saveStartlijst(gender, startlijsten[gender]);
  cur = 0;
  closeEditor();
  render();
}

function addEditorOmloop(omloop) {
  // Find how many ritten already in this omloop
  const existing = editorRitten.filter(r => r.omloop === omloop);
  const ritNr = editorRitten.length + 1;
  editorRitten.push({ rit: ritNr, omloop, banen: [null, null, null] });
}

function addRit(omloop) {
  const allRitNrs = editorRitten.map(r => r.rit);
  const maxRit = allRitNrs.length ? Math.max(...allRitNrs) : 0;
  editorRitten.push({ rit: maxRit+1, omloop, banen: [null,null,null] });
  renderEditor();
}

function removeRit(idx) {
  editorRitten.splice(idx, 1);
  // Renumber
  editorRitten.forEach((r,i) => r.rit = i+1);
  renderEditor();
}

function setSlot(ritIdx, baanIdx, naam) {
  editorRitten[ritIdx].banen[baanIdx] = naam || null;
  renderPoolList();
}

function getUsedNames() {
  const used = new Set();
  editorRitten.forEach(r => r.banen.forEach(n => { if(n) used.add(n); }));
  return used;
}

function renderPoolList() {
  const used = getUsedNames();
  const deelnemers = DEELNEMERS[gender];
  let html = '';
  deelnemers.forEach(naam => {
    const isUsed = used.has(naam);
    html += `<div class="pool-rider${isUsed?' used':''}">
      ${naam}
      ${isUsed ? `<span class="used-badge">✓ ingepland</span>` : ''}
    </div>`;
  });
  document.getElementById('poolList').innerHTML = html;
  document.getElementById('poolHeader').textContent =
    `DEELNEMERS (${used.size}/${deelnemers.length})`;
}

function renderEditor() {
  const deelnemers = DEELNEMERS[gender];
  const used = getUsedNames();

  // Build options HTML
  const opts = `<option value="">— Kies rijder —</option>` +
    deelnemers.map(n =>
      `<option value="${n}">${n}</option>`
    ).join('');

  // Group by omloop
  const omlopen = [...new Set(editorRitten.map(r => r.omloop))].sort((a,b) => a-b);
  const maxOmloop = omlopen.length ? Math.max(...omlopen) : 1;

  let html = '';
  omlopen.forEach(omloop => {
    html += `<div class="editor-omloop-title">OMLOOP ${omloop}</div>`;
    editorRitten.forEach((r, i) => {
      if (r.omloop !== omloop) return;
      const slots = BAANEN.map((baan, bi) => {
        const cls = bc(baan);
        const selected = r.banen[bi] || '';
        return `<div class="editor-slot">
          <div class="slot-baan-label">
            <div class="slot-dot ${cls}"></div>
            <span class="slot-label-txt ${cls}">${baan.toUpperCase()}</span>
          </div>
          <select class="slot-select" onchange="setSlot(${i},${bi},this.value)">
            ${deelnemers.map(n =>
              `<option value="${n}" ${n===selected?'selected':''}>${n}</option>`
            ).join('')}
            <option value="" ${!selected?'selected':''}>— leeg —</option>
          </select>
        </div>`;
      }).join('');
      html += `<div class="editor-rit-row">
        <div class="editor-rit-num">${r.rit}</div>
        <div class="editor-slots">${slots}</div>
        <button class="editor-rit-del" onclick="removeRit(${i})" title="Rit verwijderen">✕</button>
      </div>`;
    });
    html += `<div class="editor-add-rit" onclick="addRit(${omloop})">+ RIT TOEVOEGEN AAN OMLOOP ${omloop}</div>`;
  });

  // Add omloop 2 button if only omloop 1 exists
  if (!omlopen.includes(2)) {
    html += `<div class="editor-add-rit" onclick="addRit(2)" style="border-color:rgba(240,192,64,0.2);color:rgba(240,192,64,0.5);">
      + OMLOOP 2 STARTEN
    </div>`;
  }

  document.getElementById('editorRitten').innerHTML = html;
  renderPoolList();
}

// ══ ZOOM ══════════════════════════════════════════════════════════════════════
let zoomLevel = parseInt(localStorage.getItem('dzb_zoom') || '100');
const ZP = [{id:'zp-s',val:75},{id:'zp-m',val:90},{id:'zp-l',val:100}];
function applyZoom() {
  document.documentElement.style.zoom = zoomLevel + '%';
  document.getElementById('zoomPct').textContent = zoomLevel + '%';
  localStorage.setItem('dzb_zoom', zoomLevel);
  ZP.forEach(p => document.getElementById(p.id).classList.toggle('active', p.val===zoomLevel));
}
function changeZoom(d) { zoomLevel=Math.min(130,Math.max(60,zoomLevel+d)); applyZoom(); }
function setZoom(v) { zoomLevel=v; applyZoom(); }

let tileZoom = parseInt(localStorage.getItem('dzb_tile_zoom') || '100');
function applyTileZoom() {
  const inner = document.getElementById('tileZoomInner');
  if (!inner) return;
  const s = tileZoom/100;
  inner.style.transform = `scale(${s})`;
  inner.style.width  = (100/s)+'%';
  inner.style.height = (100/s)+'%';
  document.getElementById('tileZoomPct').textContent = tileZoom+'%';
  localStorage.setItem('dzb_tile_zoom', tileZoom);
}
function changeTileZoom(d) { tileZoom=Math.min(150,Math.max(60,tileZoom+d)); applyTileZoom(); }

// ══ KEYBOARD ══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.getElementById('editorOverlay').classList.contains('open')) return;
  if (e.key==='ArrowRight') navigate(1);
  if (e.key==='ArrowLeft')  navigate(-1);
  if (e.key==='+' || e.key==='=') changeZoom(+5);
  if (e.key==='-') changeZoom(-5);
});

// ══ INIT ══════════════════════════════════════════════════════════════════════
applyZoom();
applyTileZoom();
render();
</script>
</body>
</html>
