<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Zilveren Bal 2026 — Hoofdtoernooi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--navy-mid:#0d1b33;--navy-card:#111e38;
  --silver:#b8cce0;--silver-dim:#6a8aaa;--silver-bright:#dde8f4;
  --gold:#f0c040;--ice:#cce4f8;--ice-dim:#6898b8;--accent:#4a8eca;
  --red-baan:#e84040;--geel-baan:#f0c040;
  --c-kids:#b8cce0;--c-ol1d:#d060a0;--c-ol1h:#4a8eca;--c-mascot:#b07cfc;
  --c-battle:#f07040;--c-joy:#38c080;--c-hf:#f0c040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--navy);color:var(--silver-bright);font-family:"DM Sans",sans-serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse at 15% 60%,rgba(74,142,202,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 10%,rgba(200,212,232,.04) 0%,transparent 45%);}
header{display:flex;align-items:center;gap:9px;padding:6px 14px;
  background:var(--navy-mid);border-bottom:1px solid rgba(200,220,240,.10);flex-shrink:0;}
.logo-circle{width:33px;height:33px;border-radius:50%;
  background:linear-gradient(135deg,#dce8f8,#8aaccc,#dce8f8);
  display:flex;align-items:center;justify-content:center;
  font-family:"Bebas Neue",cursive;font-size:7px;color:var(--navy);text-align:center;line-height:1.3;flex-shrink:0;}
.hdr-title{font-family:"Bebas Neue",cursive;font-size:17px;letter-spacing:3px;line-height:1;}
.hdr-title span{color:var(--gold);}
.hdr-sub{font-size:8px;color:var(--ice-dim);letter-spacing:2px;text-transform:uppercase;}
.hdr-sep{width:1px;height:26px;background:rgba(200,220,240,.10);margin:0 2px;}
.mode-btn{padding:4px 11px;border-radius:5px;cursor:pointer;
  font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:2px;
  border:1px solid rgba(200,220,240,.14);background:rgba(200,220,240,.05);color:var(--silver-dim);transition:all .15s;}
.mode-btn.active{background:rgba(240,192,64,.15);border-color:var(--gold);color:var(--gold);}
.mode-btn:not(.active):hover{background:rgba(200,220,240,.08);color:var(--silver);}
.spec-btn{padding:4px 10px;border-radius:5px;cursor:pointer;font-family:"Bebas Neue",cursive;
  font-size:10.5px;letter-spacing:1.5px;border:1px solid;transition:all .15s;white-space:nowrap;}
.spec-btn.battle{background:rgba(240,112,64,.12);border-color:rgba(240,112,64,.3);color:#f09070;}
.spec-btn.battle:hover{background:rgba(240,112,64,.22);}
.spec-btn.driekm{background:rgba(56,192,96,.12);border-color:rgba(56,192,96,.3);color:#6de898;}
.spec-btn.driekm:hover{background:rgba(56,192,96,.22);}
.header-nav{margin-left:auto;display:flex;align-items:center;gap:6px;}
.nav-hint{font-size:8.5px;color:var(--ice-dim);letter-spacing:1px;}
.nav-btn{width:27px;height:27px;border:1px solid rgba(200,212,232,.18);background:rgba(200,212,232,.05);
  color:var(--silver);border-radius:5px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nav-btn:hover{background:rgba(200,212,232,.12);border-color:var(--accent);color:#fff;}
.nav-btn:disabled{opacity:.28;cursor:default;}
.blok-counter{font-family:"Bebas Neue",cursive;font-size:16px;letter-spacing:2px;color:var(--gold);min-width:54px;text-align:center;}
.zoom-group{display:flex;align-items:center;gap:4px;padding-left:7px;border-left:1px solid rgba(200,220,240,.10);margin-left:3px;}
.zoom-label{font-size:8px;color:var(--ice-dim);letter-spacing:1px;white-space:nowrap;}
.zoom-btn{width:23px;height:23px;border:1px solid rgba(200,212,232,.16);background:rgba(200,212,232,.05);
  color:var(--silver);border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;transition:all .15s;}
.zoom-btn:hover{background:rgba(200,212,232,.12);border-color:var(--accent);color:#fff;}
.zoom-pct{font-family:"Bebas Neue",cursive;font-size:13px;color:var(--silver);min-width:32px;text-align:center;letter-spacing:1px;}
.zoom-presets{display:flex;gap:2px;}
.zoom-preset{font-size:7.5px;padding:2px 4px;border-radius:3px;cursor:pointer;
  border:1px solid rgba(200,212,232,.12);background:rgba(200,212,232,.04);color:var(--silver-dim);transition:all .15s;}
.zoom-preset:hover{background:rgba(200,212,232,.10);color:var(--silver);}
.zoom-preset.active{background:rgba(74,142,202,.20);border-color:var(--accent);color:var(--ice);}
.zoom-sep{width:1px;height:16px;background:rgba(200,220,240,.10);margin:0 2px;}
.main{display:flex;flex:1;overflow:hidden;}
.panel-left{width:200px;flex-shrink:0;border-right:1px solid rgba(200,220,240,.07);
  display:flex;flex-direction:column;background:rgba(7,15,28,.6);}
.pl-hdr{padding:6px 11px 5px;border-bottom:1px solid rgba(200,220,240,.07);
  font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:3px;color:var(--ice-dim);flex-shrink:0;}
.sl-scroll{flex:1;overflow-y:auto;padding:2px 0;}
.sl-scroll::-webkit-scrollbar{width:3px;}
.sl-scroll::-webkit-scrollbar-thumb{background:rgba(200,212,232,.12);border-radius:2px;}
.sl-sectie{padding:5px 10px 3px;font-family:"Bebas Neue",cursive;font-size:8.5px;letter-spacing:2.5px;
  border-top:1px solid rgba(200,220,240,.07);margin-top:2px;display:flex;align-items:center;gap:5px;}
.sl-sectie:first-child{border-top:none;margin-top:0;}
.sl-sectie-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sl-item{padding:4px 9px;cursor:pointer;border-left:3px solid transparent;transition:background .12s;}
.sl-item:hover{background:rgba(200,212,232,.05);}
.sl-item.active{background:rgba(74,142,202,.16);border-left-color:var(--accent);}
.sl-item.upcoming{background:rgba(74,142,202,.06);border-left-color:rgba(74,142,202,.28);}
.sl-num{font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:1px;color:var(--gold);}
.sl-riders{display:flex;flex-direction:column;gap:1px;}
.sl-rider{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--silver);line-height:1.4;}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot.wit{background:#fff;}.dot.geel{background:var(--geel-baan);}.dot.rood{background:var(--red-baan);}
.dot.empty{background:rgba(200,220,240,.18);border:1px dashed rgba(200,220,240,.28);}
.dot.special{background:var(--c-battle);}
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}
#tileZoomWrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#tileZoomInner{position:absolute;inset:0;display:flex;flex-direction:column;
  padding:10px 14px 6px;gap:8px;transform-origin:top left;transition:transform .15s ease;width:100%;height:100%;}
.rit-cards{display:flex;flex-direction:column;gap:8px;flex:1;overflow:hidden;}
.rit-card{flex:1;background:var(--navy-card);border:1px solid rgba(200,220,240,.08);
  border-radius:11px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.rit-card.current{border-color:rgba(74,142,202,.38);box-shadow:0 0 24px rgba(74,142,202,.09);}
.card-header{display:flex;align-items:center;gap:10px;padding:7px 14px;
  border-bottom:1px solid rgba(200,220,240,.07);flex-shrink:0;background:rgba(0,0,0,.18);}
.card-rit-num{font-family:"Bebas Neue",cursive;font-size:30px;color:var(--gold);line-height:1;min-width:36px;}
.card-meta{flex:1;}
.card-tag{font-family:"Bebas Neue",cursive;font-size:9px;letter-spacing:3px;color:var(--accent);}
.card-sub{font-family:"Bebas Neue",cursive;font-size:11.5px;letter-spacing:2px;color:var(--silver-dim);}
.sectie-pill{font-family:"Bebas Neue",cursive;font-size:9.5px;letter-spacing:2px;
  padding:3px 9px;border-radius:18px;border:1px solid;white-space:nowrap;}
.pill-kids{background:rgba(184,204,224,.10);color:var(--c-kids);border-color:rgba(184,204,224,.22);}
.pill-ol1d,.pill-ol2d{background:rgba(208,96,160,.11);color:var(--c-ol1d);border-color:rgba(208,96,160,.24);}
.pill-ol1h,.pill-ol2h{background:rgba(74,142,202,.12);color:var(--c-ol1h);border-color:rgba(74,142,202,.26);}
.pill-mascot{background:rgba(176,124,252,.11);color:var(--c-mascot);border-color:rgba(176,124,252,.24);}
.pill-battle{background:rgba(240,112,64,.11);color:var(--c-battle);border-color:rgba(240,112,64,.26);}
.pill-joy{background:rgba(56,192,96,.11);color:var(--c-joy);border-color:rgba(56,192,96,.24);}
.pill-hfd,.pill-hfh{background:rgba(240,192,64,.11);color:var(--c-hf);border-color:rgba(240,192,64,.24);}
.pill-fnd,.pill-fnh{background:rgba(240,192,64,.18);color:var(--gold);border-color:rgba(240,192,64,.38);}
.card-body{display:flex;flex:1;overflow:hidden;min-height:0;}
.rider-col{flex:1;display:flex;flex-direction:column;padding:9px 12px 8px;
  border-right:1px solid rgba(200,220,240,.06);overflow-y:auto;min-width:0;}
.rider-col:last-child{border-right:none;}
.rider-col::-webkit-scrollbar{width:3px;}
.rider-col::-webkit-scrollbar-thumb{background:rgba(200,212,232,.10);border-radius:2px;}
.baan-tag{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-shrink:0;}
.baan-bar{width:20px;height:3px;border-radius:2px;flex-shrink:0;}
.baan-bar.wit{background:#fff;}.baan-bar.rood{background:var(--red-baan);}.baan-bar.geel{background:var(--geel-baan);}
.baan-lbl{font-family:"Bebas Neue",cursive;font-size:11.5px;letter-spacing:1.5px;}
.baan-lbl.wit{color:rgba(255,255,255,.58);}.baan-lbl.rood{color:var(--red-baan);}.baan-lbl.geel{color:var(--geel-baan);}
.rider-name{font-family:"Bebas Neue",cursive;font-size:20px;letter-spacing:.5px;
  color:var(--silver-bright);line-height:1;margin-bottom:7px;flex-shrink:0;}
.rider-name.empty{color:rgba(200,220,240,.2);font-size:12px;margin-top:3px;
  font-style:italic;font-family:"DM Sans",sans-serif;font-weight:300;letter-spacing:0;}
.info-list{display:flex;flex-direction:column;gap:0;}
.info-item{display:flex;flex-direction:column;padding:3.5px 0;border-bottom:1px solid rgba(200,220,240,.06);}
.info-item:last-child{border-bottom:none;}
.info-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ice-dim);margin-bottom:2px;}
.info-val{font-size:11.5px;color:var(--silver);line-height:1.35;}
.info-val.hi{color:var(--ice);font-weight:500;}
.time-val{font-size:14px !important;font-weight:600 !important;letter-spacing:1px;display:flex;align-items:baseline;gap:6px;}
.time-loc{font-size:9px;font-weight:400;color:var(--ice-dim);letter-spacing:1px;text-transform:uppercase;}
.zb-history{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.zb-cell{display:flex;flex-direction:column;align-items:center;
  background:rgba(200,220,240,.04);border:1px solid rgba(200,220,240,.08);border-radius:5px;padding:3px 6px;min-width:38px;}
.zb-cell.has-result{background:rgba(74,142,202,.11);border-color:rgba(74,142,202,.24);}
.zb-yr{font-size:7.5px;color:var(--ice-dim);letter-spacing:1px;margin-bottom:1px;}
.zb-val{font-family:"Bebas Neue",cursive;font-size:14px;color:rgba(200,220,240,.2);letter-spacing:1px;line-height:1;}
.zb-cell.has-result .zb-val{color:var(--gold);}
.no-info{font-size:10.5px;color:rgba(200,212,232,.2);font-style:italic;margin-top:5px;}
.afscheid-badge{display:inline-flex;align-items:center;gap:4px;margin-bottom:5px;
  background:rgba(240,192,64,.10);border:1px solid rgba(240,192,64,.24);
  border-radius:4px;padding:2px 7px;font-family:"Bebas Neue",cursive;font-size:9.5px;letter-spacing:1.5px;color:var(--gold);}
.battle-info-item{display:flex;flex-direction:column;padding:3.5px 0;border-bottom:1px solid rgba(240,112,64,.10);}
.battle-info-item:last-child{border-bottom:none;}
.battle-info-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(240,160,100,.65);margin-bottom:2px;}
.battle-info-val{font-size:11.5px;color:rgba(240,180,150,.9);line-height:1.35;}
.joy-dist-badge{display:flex;align-items:center;gap:8px;margin-bottom:8px;
  background:rgba(56,192,96,.09);border:1px solid rgba(56,192,96,.22);border-radius:6px;padding:5px 10px;}
.joy-dist-num{font-family:"Bebas Neue",cursive;font-size:26px;color:var(--c-joy);letter-spacing:2px;line-height:1;}
.joy-dist-lbl{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(56,192,96,.55);}
.kb-hint{display:flex;justify-content:center;align-items:center;gap:6px;
  font-size:9px;color:rgba(200,212,232,.18);letter-spacing:1px;flex-shrink:0;padding-bottom:2px;}
.kkey{background:rgba(200,212,232,.05);border:1px solid rgba(200,212,232,.10);
  border-radius:3px;padding:1px 5px;font-size:9px;color:rgba(200,212,232,.28);}
.editor-overlay{display:none;position:fixed;inset:0;z-index:100;
  background:rgba(5,12,24,.92);backdrop-filter:blur(4px);flex-direction:column;overflow:hidden;}
.editor-overlay.open{display:flex;}
.editor-header{display:flex;align-items:center;gap:12px;padding:10px 20px;
  background:var(--navy-mid);border-bottom:1px solid rgba(200,220,240,.10);flex-shrink:0;}
.editor-title{font-family:"Bebas Neue",cursive;font-size:19px;letter-spacing:3px;}
.editor-title span{color:var(--gold);}
.ed-save{margin-left:auto;padding:5px 15px;border-radius:6px;cursor:pointer;
  font-family:"Bebas Neue",cursive;font-size:12px;letter-spacing:2px;
  background:rgba(56,192,96,.16);border:1px solid rgba(56,192,96,.32);color:#6de898;transition:all .15s;}
.ed-save:hover{background:rgba(56,192,96,.28);}
.ed-close{padding:5px 13px;border-radius:6px;cursor:pointer;font-family:"Bebas Neue",cursive;
  font-size:12px;letter-spacing:2px;background:rgba(200,220,240,.06);
  border:1px solid rgba(200,220,240,.15);color:var(--silver);transition:all .15s;}
.ed-close:hover{background:rgba(200,220,240,.12);color:#fff;}
.editor-body{display:flex;flex:1;overflow:hidden;}
.editor-pool{width:205px;flex-shrink:0;border-right:1px solid rgba(200,220,240,.08);
  display:flex;flex-direction:column;background:rgba(7,15,28,.5);}
.pool-tabs{display:flex;border-bottom:1px solid rgba(200,220,240,.08);flex-shrink:0;}
.pool-tab{flex:1;padding:7px 4px;text-align:center;cursor:pointer;font-family:"Bebas Neue",cursive;
  font-size:10px;letter-spacing:2px;color:var(--silver-dim);border-bottom:2px solid transparent;transition:all .15s;}
.pool-tab.active.dames{color:var(--c-ol1d);border-bottom-color:var(--c-ol1d);}
.pool-tab.active.heren{color:var(--c-ol1h);border-bottom-color:var(--c-ol1h);}
.pool-tab.active.div{color:var(--c-mascot);border-bottom-color:var(--c-mascot);}
.pool-tab:not(.active):hover{color:var(--silver);}
.editor-pool-scroll{flex:1;overflow-y:auto;padding:2px 0;}
.editor-pool-scroll::-webkit-scrollbar{width:3px;}
.editor-pool-scroll::-webkit-scrollbar-thumb{background:rgba(200,212,232,.12);border-radius:2px;}
.pool-rider{padding:5px 11px;font-size:11px;color:var(--silver);cursor:pointer;
  transition:background .12s;display:flex;align-items:center;gap:4px;}
.pool-rider:hover{background:rgba(200,212,232,.07);}
.pool-rider.used{color:rgba(200,212,232,.26);cursor:default;}
.pool-rider.used:hover{background:transparent;}
.pool-used-badge{font-size:7.5px;color:rgba(200,212,232,.26);margin-left:auto;}
.editor-content{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:5px;}
.editor-content::-webkit-scrollbar{width:4px;}
.editor-content::-webkit-scrollbar-thumb{background:rgba(200,212,232,.12);border-radius:2px;}
.ed-sectie-hdr{display:flex;align-items:center;gap:7px;font-family:"Bebas Neue",cursive;
  font-size:11px;letter-spacing:3px;padding:5px 0 3px;
  border-bottom:1px solid rgba(200,220,240,.08);margin-top:5px;}
.ed-sectie-hdr:first-child{margin-top:0;}
.ed-sectie-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ed-rit-row{display:flex;align-items:flex-start;gap:7px;
  background:var(--navy-card);border:1px solid rgba(200,220,240,.08);border-radius:7px;padding:7px 9px;}
.ed-rit-num{font-family:"Bebas Neue",cursive;font-size:24px;color:var(--gold);min-width:30px;line-height:1;padding-top:2px;}
.ed-slots{display:flex;gap:6px;flex:1;flex-wrap:wrap;}
.ed-slot{flex:1;min-width:95px;display:flex;flex-direction:column;gap:2px;}
.slot-lbl{font-size:7.5px;letter-spacing:1px;font-family:"Bebas Neue",cursive;
  display:flex;align-items:center;gap:3px;margin-bottom:1px;}
.sd{width:5px;height:5px;border-radius:50%;}
.sd.wit{background:#fff;}.sd.geel{background:var(--geel-baan);}.sd.rood{background:var(--red-baan);}
.st-wit{color:rgba(255,255,255,.5);}.st-geel{color:var(--geel-baan);}.st-rood{color:var(--red-baan);}
.slot-sel{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(200,220,240,.14);
  border-radius:4px;color:var(--silver);font-size:10.5px;padding:3px 5px;
  font-family:"DM Sans",sans-serif;cursor:pointer;outline:none;transition:border-color .15s;}
.slot-sel:focus{border-color:var(--accent);}
.slot-sel option{background:#111e38;}
.bi-row{display:flex;flex-direction:column;gap:1px;margin-top:3px;}
.bi-lbl{font-size:7.5px;letter-spacing:1px;color:rgba(240,160,100,.55);text-transform:uppercase;}
.bi-inp{width:100%;background:rgba(0,0,0,.28);border:1px solid rgba(240,112,64,.17);
  border-radius:3px;color:rgba(240,180,150,.9);font-size:10px;padding:3px 5px;
  font-family:"DM Sans",sans-serif;outline:none;transition:border-color .15s;}
.bi-inp:focus{border-color:rgba(240,112,64,.4);}
.ed-del{width:21px;height:21px;border-radius:4px;cursor:pointer;font-size:11px;
  border:1px solid rgba(232,64,64,.2);background:rgba(232,64,64,.05);
  color:rgba(232,64,64,.48);display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;margin-top:3px;}
.ed-del:hover{background:rgba(232,64,64,.18);color:var(--red-baan);border-color:var(--red-baan);}
.ed-add{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;
  border:1px dashed rgba(200,220,240,.13);border-radius:7px;cursor:pointer;
  color:rgba(200,220,240,.28);font-size:10.5px;letter-spacing:1px;transition:all .15s;}
.ed-add:hover{border-color:rgba(74,142,202,.38);color:var(--accent);background:rgba(74,142,202,.05);}
.aank-overlay{display:none;position:fixed;inset:0;z-index:300;
  background:rgba(3,8,18,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;cursor:pointer;}
.aank-overlay.open{display:flex;}
.aank-card{border-radius:18px;overflow:hidden;max-width:760px;width:92vw;
  box-shadow:0 30px 80px rgba(0,0,0,.7);cursor:default;border:1px solid rgba(200,220,240,.10);}
.aank-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:13px;padding:48px 42px 34px;text-align:center;}
.aank-close{padding:10px;text-align:center;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(200,220,240,.22);border-top:1px solid rgba(200,220,240,.08);background:rgba(0,0,0,.2);}
.battle-bg{background:linear-gradient(145deg,#1a0a08,#2a0e06,#1a0a08);}
.b-emoji{font-size:62px;line-height:1;}
.b-title{font-family:"Bebas Neue",cursive;font-size:56px;letter-spacing:6px;color:#f08060;line-height:1;text-shadow:0 0 40px rgba(232,80,40,.5);}
.b-sub{font-family:"Bebas Neue",cursive;font-size:19px;letter-spacing:4px;color:rgba(240,180,150,.6);}

function loadProgramma(){
  try{const r=localStorage.getItem('dzb_main_p3');if(r)return JSON.parse(r);}catch(e){}
  return [{sectieId:'kids',riders:[null,null,null],battleInfo:[]},
          {sectieId:'kids',riders:[null,null,null],battleInfo:[]}];
}
function saveProgramma(){localStorage.setItem('dzb_main_p3',JSON.stringify(programma));}

const BD=['Wit','Geel','Rood'];
const BM={Wit:'BINNEN - WIT',Rood:'MIDDEN - ROOD',Geel:'BUITEN - GEEL'};

function riderInfoHTML(naam){
  const info=getInfo(naam);
  const isAf=naam&&AFSCHEID.some(n=>naam.toLowerCase().includes(n.toLowerCase()));
  let h=isAf?'<div class="afscheid-badge">LAATSTE ZILVEREN BAL</div>':'';
  if(!info)return h+'<div class="no-info">Info volgt</div>';
  const zb=[{yr:'2025',v:info.zb25},{yr:'2024',v:info.zb24},{yr:'2023',v:info.zb23},{yr:'2022',v:info.zb22}];
  const zbH=zb.map(z=>'<div class="zb-cell'+(z.v!='-'?' has-result':'')+'"><div class="zb-yr">'+z.yr+'</div><div class="zb-val">'+z.v+'</div></div>').join('');
  return h+'<div class="info-list">'
    +'<div class="info-item"><div class="info-lbl">100m PR</div><div class="info-val hi time-val">'+info.pr100+'<span class="time-loc">'+info.loc100+'</span></div></div>'
    +'<div class="info-item"><div class="info-lbl">500m PR</div><div class="info-val hi time-val">'+info.pr500+'<span class="time-loc">'+info.loc500+'</span></div></div>'
    +'<div class="info-item"><div class="info-lbl">Opening 100m</div><div class="info-val">'+info.tus100+'</div></div>'
    +'<div class="info-item"><div class="info-lbl">De Zilveren Bal</div><div class="zb-history">'+zbH+'</div></div>'
    +'</div>';
}

function colRit3(naam,bi){
  const b=BD[bi],cls=b.toLowerCase();
  return '<div class="rider-col">'
    +'<div class="baan-tag"><div class="baan-bar '+cls+'"></div><span class="baan-lbl '+cls+'">'+BM[b]+'</span></div>'
    +(naam?'<div class="rider-name">'+naam+'</div>'+riderInfoHTML(naam):'<div class="rider-name empty">Nog niet ingevuld</div>')
    +'</div>';
}

function colBattle(naam,bi){
  const biH=(naam&&bi&&(bi.sport||bi.info))
    ?'<div>'+(bi.sport?'<div class="battle-info-item"><div class="battle-info-lbl">Discipline</div><div class="battle-info-val">'+bi.sport+'</div></div>':'')
      +(bi.info?'<div class="battle-info-item"><div class="battle-info-lbl">Info</div><div class="battle-info-val">'+bi.info+'</div></div>':'')+'</div>':'';
  return '<div class="rider-col">'
    +'<div style="height:3px;margin-bottom:6px;background:linear-gradient(90deg,var(--c-battle),transparent);border-radius:2px;"></div>'
    +(naam?'<div class="rider-name">'+naam+'</div>'+biH:'<div class="rider-name empty">Nog niet ingevuld</div>')
    +'</div>';
}

function colJoy(naam){
  return '<div class="rider-col">'
    +'<div class="joy-dist-badge"><div class="joy-dist-num">3KM</div><div class="joy-dist-lbl">afstandsrit</div></div>'
    +(naam?'<div class="rider-name" style="font-size:22px">'+naam+'</div>'+riderInfoHTML(naam):'<div class="rider-name empty">Nog niet ingevuld</div>')
    +'</div>';
}

function cardHTML(blok,isCurrent){
  const s=gS(blok.sectieId),seqNr=programma.indexOf(blok)+1;
  let body='';
  if(s.type=='rit2'){
    body='<div class="card-body">'+colJoy(blok.riders[0])+colJoy(blok.riders[1])+'</div>';
  } else if(s.type=='battle'){
    body='<div class="card-body">'+blok.riders.map((n,i)=>colBattle(n,(blok.battleInfo||[])[i])).join('')+'</div>';
  } else {
    body='<div class="card-body">'+[0,1,2].map(i=>colRit3(blok.riders[i],i)).join('')+'</div>';
  }
  return '<div class="rit-card'+(isCurrent?' current':'')+'"><div class="card-header">'
    +'<div class="card-rit-num">'+seqNr+'</div>'
    +'<div class="card-meta"><div class="card-tag">'+(isCurrent?'HUIDIG BLOK':'VOLGEND BLOK')+'</div>'
    +'<div class="card-sub">'+s.label+'</div></div>'
    +'<div class="sectie-pill '+s.pill+'">'+s.label+'</div></div>'+body+'</div>';
}

function renderLeft(){
  if(!programma.length){
    document.getElementById('slScroll').innerHTML='<div style="padding:18px 11px;font-size:10.5px;color:rgba(200,220,240,.28);font-style:italic;line-height:1.6;">Nog geen programma.<br><br>Klik PROGRAMMA INVULLEN.</div>';
    return;
  }
  let html='',lastId=null;
  programma.forEach((blok,i)=>{
    const s=gS(blok.sectieId);
    if(blok.sectieId!==lastId){
      html+='<div class="sl-sectie"><div class="sl-sectie-dot" style="background:'+s.dot+'"></div>'
        +'<span style="color:'+s.dot+';font-size:8.5px">'+s.label+'</span></div>';
      lastId=blok.sectieId;
    }
    const cls=i===cur?'sl-item active':i===cur+1?'sl-item upcoming':'sl-item';
    let ridersH='';
    if(s.type=='rit2'){
      ridersH=blok.riders.slice(0,2).map(n=>'<div class="sl-rider"><div class="dot '+(n?'special':'empty')+'"></div>'+(n||'&mdash;')+'</div>').join('');
    } else {
      ['Wit','Geel','Rood'].forEach((b,bi)=>{
        const n=blok.riders[bi];
        ridersH+='<div class="sl-rider"><div class="dot '+(n?b.toLowerCase():'empty')+'"></div>'+(n||'&mdash;')+'</div>';
      });
    }
    html+='<div class="'+cls+'" id="sl'+i+'" onclick="jumpTo('+i+')">'
      +'<div style="margin-bottom:2px"><span class="sl-num">'+( i+1)+'</span></div>'
      +'<div class="sl-riders">'+ridersH+'</div></div>';
  });
  document.getElementById('slScroll').innerHTML=html;
}

function renderRight(){
  if(!programma.length){
    document.getElementById('ritCards').innerHTML='<div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;opacity:.25;"><div style="font-family:\'Bebas Neue\',cursive;font-size:24px;letter-spacing:3px;">GEEN PROGRAMMA</div><div style="font-size:12px;">Gebruik Programma invullen</div></div>';
    document.getElementById('blokCounter').textContent='- / -';
    document.getElementById('btnPrev').disabled=true;
    document.getElementById('btnNext').disabled=true;
    return;
  }
  const c=programma[cur],n=programma[cur+1];
  document.getElementById('ritCards').innerHTML=cardHTML(c,true)+(n?cardHTML(n,false):'');
  document.getElementById('blokCounter').textContent=(cur+1)+' / '+programma.length;
  document.getElementById('btnPrev').disabled=cur===0;
  document.getElementById('btnNext').disabled=cur>=programma.length-1;
}

function render(){
  renderLeft();renderRight();
  const el=document.getElementById('sl'+cur);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function navigate(dir){const n=cur+dir;if(n>=0&&n<programma.length){cur=n;render();}}
function jumpTo(i){cur=i;render();}

let edProg=[],poolTab='dames';
function setMode(mode){
  document.getElementById('btnView').classList.toggle('active',mode==='view');
  document.getElementById('btnEdit').classList.toggle('active',mode==='edit');
  if(mode==='edit')openEditor();
}
function openEditor(){
  edProg=JSON.parse(JSON.stringify(programma));
  renderEditorContent();renderPoolList();
  document.getElementById('editorOverlay').classList.add('open');
}
function closeEditor(){
  document.getElementById('editorOverlay').classList.remove('open');
  document.getElementById('btnView').classList.add('active');
  document.getElementById('btnEdit').classList.remove('active');
}
function saveAndClose(){
  programma=JSON.parse(JSON.stringify(edProg));
  saveProgramma();
  cur=Math.min(cur,Math.max(0,programma.length-1));
  closeEditor();render();
}
function setPoolTab(t){
  poolTab=t;
  ['ptDames','ptHeren','ptDiv'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(t==='dames'?'ptDames':t==='heren'?'ptHeren':'ptDiv').classList.add('active');
  renderPoolList();
}
function getUsedNames(){
  const u=new Set();edProg.forEach(b=>b.riders.forEach(n=>{if(n)u.add(n);}));return u;
}
function renderPoolList(){
  const used=getUsedNames();
  const pool=poolTab==='div'?DEELNEMERS.div:DEELNEMERS[poolTab];
  document.getElementById('poolList').innerHTML=pool.map(n=>{
    const isUsed=used.has(n);
    return '<div class="pool-rider'+(isUsed?' used':'')+'">'+n+(isUsed?'<span class="pool-used-badge">'+String.fromCharCode(10003)+'</span>':'')+'</div>';
  }).join('');
}
function getPoolForSectie(sid){
  const s=gS(sid);
  if(s.pool==='dames')return DEELNEMERS.dames;
  if(s.pool==='heren')return DEELNEMERS.heren;
  return ALLE();
}
function addBlok(sid){
  const s=gS(sid);
  const slots=s.type==='rit2'?2:3;
  const nb={sectieId:sid,riders:Array(slots).fill(null),
    battleInfo:sid==='battle'?Array(slots).fill({sport:'',info:''}):[]};
  let lastIdx=-1;
  edProg.forEach((b,i)=>{if(b.sectieId===sid)lastIdx=i;});
  if(lastIdx>=0)edProg.splice(lastIdx+1,0,nb);
  else edProg.push(nb);
  renderEditorContent();renderPoolList();
}
function removeBlok(i){edProg.splice(i,1);renderEditorContent();renderPoolList();}
function setRider(bi,si,naam){edProg[bi].riders[si]=naam||null;renderPoolList();}
function setBattleInfo(bi,si,field,val){
  if(!edProg[bi].battleInfo)edProg[bi].battleInfo=[];
  if(!edProg[bi].battleInfo[si])edProg[bi].battleInfo[si]={};
  edProg[bi].battleInfo[si][field]=val;
}
function renderEditorContent(){
  let html='';
  SECTIES.forEach(sectie=>{
    const blokkens=edProg.map((b,i)=>({b,i})).filter(x=>x.b.sectieId===sectie.id);
    html+='<div class="ed-sectie-hdr" style="color:'+sectie.dot+'">'
      +'<div class="ed-sectie-dot" style="background:'+sectie.dot+'"></div>'+sectie.label+'</div>';
    blokkens.forEach(function(x){
      const b=x.b,i=x.i;
      const pool=getPoolForSectie(sectie.id);
      let slotsH='';
      if(sectie.type==='battle'){
        slotsH=[0,1,2].map(function(si){
          const bi=b.battleInfo&&b.battleInfo[si]?b.battleInfo[si]:{sport:'',info:''};
          const opts='<option value="">leeg</option>'+ALLE().map(n=>'<option value="'+n+'"'+(b.riders[si]===n?' selected':'')+'>'+n+'</option>').join('');
          return '<div class="ed-slot" style="min-width:130px">'
            +'<div class="slot-lbl"><span style="color:var(--c-battle)">RIJDER '+(si+1)+'</span></div>'
            +'<select class="slot-sel" style="border-color:rgba(240,112,64,.2)" onchange="setRider('+i+','+si+',this.value)">'+opts+'</select>'
            +'<div class="bi-row"><div class="bi-lbl">Discipline</div>'
            +'<input class="bi-inp" type="text" placeholder="bijv. Wielrennen" value="'+(bi.sport||'')+'" oninput="setBattleInfo('+i+','+si+',\'sport\',this.value)"/></div>'
            +'<div class="bi-row"><div class="bi-lbl">Info</div>'
            +'<input class="bi-inp" type="text" placeholder="extra info" value="'+(bi.info||'')+'" oninput="setBattleInfo('+i+','+si+',\'info\',this.value)"/></div>'
            +'</div>';
        }).join('');
      } else if(sectie.type==='rit2'){
        slotsH=[0,1].map(function(si){
          const opts='<option value="">leeg</option>'+ALLE().map(n=>'<option value="'+n+'"'+(b.riders[si]===n?' selected':'')+'>'+n+'</option>').join('');
          return '<div class="ed-slot"><div class="slot-lbl"><span style="color:var(--c-joy)">RIJDER '+(si+1)+'</span></div>'
            +'<select class="slot-sel" style="border-color:rgba(56,192,96,.2)" onchange="setRider('+i+','+si+',this.value)">'+opts+'</select></div>';
        }).join('');
      } else {
        const baanDefs=[{cls:'wit',lbl:'WIT'},{cls:'geel',lbl:'GEEL'},{cls:'rood',lbl:'ROOD'}];
        slotsH=baanDefs.map(function(bd,si){
          const opts='<option value="">leeg</option>'+pool.map(n=>'<option value="'+n+'"'+(b.riders[si]===n?' selected':'')+'>'+n+'</option>').join('');
          return '<div class="ed-slot"><div class="slot-lbl"><div class="sd '+bd.cls+'"></div><span class="st-'+bd.cls+'">'+bd.lbl+'</span></div>'
            +'<select class="slot-sel" onchange="setRider('+i+','+si+',this.value)">'+opts+'</select></div>';
        }).join('');
      }
      html+='<div class="ed-rit-row"><div class="ed-rit-num">'+(i+1)+'</div>'
        +'<div class="ed-slots">'+slotsH+'</div>'
        +'<button class="ed-del" onclick="removeBlok('+i+')" title="Verwijder">'+String.fromCharCode(10005)+'</button></div>';
    });
    html+='<div class="ed-add" onclick="addBlok(\''+sectie.id+'\')">+ BLOK TOEVOEGEN</div>';
  });
  document.getElementById('editorContent').innerHTML=html;
}
function openAankondiging(type){
  const card=document.getElementById('aankCard');
  const inner=document.getElementById('aankInner');
  if(type==='battle'){
    card.className='aank-card battle-bg';
    inner.innerHTML='<div class="b-emoji">'+String.fromCodePoint(0x2694)+String.fromCodePoint(0xFE0F)+'</div>'
      +'<div class="b-title">BATTLE OF<br>DISCIPLINES</div>'
      +'<div class="b-div"></div><div class="b-sub">Na omloop 1</div>';
  } else {
    card.className='aank-card driekm-bg';
    inner.innerHTML='<div class="d-emoji">'+String.fromCodePoint(0x1F3C1)+'</div>'
      +'<div class="d-dist">3KM</div>'
      +'<div class="d-lbl">AFSTANDSRIT</div>'
      +'<div class="d-div"></div>'
      +'<div class="d-names">Joy & Jenning</div>'
      +'<div class="d-when">Na omloop 2</div>';
  }
  document.getElementById('aankOverlay').classList.add('open');
}
function closeAankondiging(){document.getElementById('aankOverlay').classList.remove('open');}
document.addEventListener('keydown',function(e){
  if(document.getElementById('aankOverlay').classList.contains('open')){
    if(e.key==='Escape')closeAankondiging();return;
  }
  if(document.getElementById('editorOverlay').classList.contains('open'))return;
  if(e.key==='ArrowRight')navigate(1);
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='+'||e.key==='=')changeZoom(+5);
  if(e.key==='-')changeZoom(-5);
});
let zoomLevel=parseInt(localStorage.getItem('dzb_zoom')||'100');
const ZPS=[{id:'zp-s',val:75},{id:'zp-m',val:90},{id:'zp-l',val:100}];
function applyZoom(){
  document.documentElement.style.zoom=zoomLevel+'%';
  document.getElementById('zoomPct').textContent=zoomLevel+'%';
  localStorage.setItem('dzb_zoom',zoomLevel);
  ZPS.forEach(p=>document.getElementById(p.id).classList.toggle('active',p.val===zoomLevel));
}
function changeZoom(d){zoomLevel=Math.min(130,Math.max(60,zoomLevel+d));applyZoom();}
function setZoom(v){zoomLevel=v;applyZoom();}
let tileZoom=parseInt(localStorage.getItem('dzb_tile_zoom')||'100');
function applyTileZoom(){
  const el=document.getElementById('tileZoomInner');if(!el)return;
  const s=tileZoom/100;
  el.style.transform='scale('+s+')';
  el.style.width=(100/s)+'%';
  el.style.height=(100/s)+'%';
  document.getElementById('tileZoomPct').textContent=tileZoom+'%';
  localStorage.setItem('dzb_tile_zoom',tileZoom);
}
function changeTileZoom(d){tileZoom=Math.min(150,Math.max(60,tileZoom+d));applyTileZoom();}
applyZoom();applyTileZoom();render();
</script>
</body>
</html>
